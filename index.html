<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🎉 Act It Out! 🎉</title>
<style>
  :root {
    --bg1: #ff6ec4;
    --bg2: #7873f5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Comic Sans MS', 'Comic Sans', 'Baloo', system-ui, sans-serif;
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    background-size: 200% 200%;
    animation: bgmove 12s ease infinite;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: 20px;
    overflow: hidden;
  }
  @keyframes bgmove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  h1 {
    font-size: clamp(2rem, 6vw, 4rem);
    text-shadow: 3px 3px 0 rgba(0,0,0,0.2);
    margin-bottom: 10px;
    letter-spacing: 1px;
  }
  .subtitle {
    font-size: clamp(1rem, 2.5vw, 1.4rem);
    opacity: 0.9;
    margin-bottom: 30px;
  }

  .card {
    background: rgba(255,255,255,0.95);
    color: #3a2a6b;
    border-radius: 30px;
    padding: 40px 30px;
    max-width: 800px;
    width: 100%;
    min-height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    margin-bottom: 30px;
    transition: transform 0.15s ease;
  }
  .card.pop { animation: pop 0.4s ease; }
  @keyframes pop {
    0% { transform: scale(0.8) rotate(-3deg); opacity: 0.3; }
    60% { transform: scale(1.05) rotate(1deg); }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }

  #action {
    font-size: clamp(1.6rem, 5vw, 3.2rem);
    font-weight: bold;
    line-height: 1.25;
  }

  .controls { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }

  button {
    font-family: inherit;
    font-size: clamp(1.1rem, 3vw, 1.8rem);
    font-weight: bold;
    padding: 18px 38px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    color: #fff;
    background: #ff4081;
    box-shadow: 0 8px 0 #c2185b, 0 12px 20px rgba(0,0,0,0.25);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
    user-select: none;
  }
  button:hover { filter: brightness(1.05); }
  button:active {
    transform: translateY(6px);
    box-shadow: 0 2px 0 #c2185b, 0 4px 8px rgba(0,0,0,0.25);
  }
  #timerBtn {
    background: #00bcd4;
    box-shadow: 0 8px 0 #00838f, 0 12px 20px rgba(0,0,0,0.25);
  }
  #timerBtn:active { box-shadow: 0 2px 0 #00838f, 0 4px 8px rgba(0,0,0,0.25); }

  .counter {
    margin-top: 26px;
    font-size: clamp(0.9rem, 2vw, 1.1rem);
    opacity: 0.85;
  }
  #countdown {
    font-size: clamp(1.2rem, 3vw, 1.6rem);
    margin-top: 14px;
    font-weight: bold;
    height: 1.6em;
  }

  .other-game {
    display: inline-block;
    margin-top: 22px;
    padding: 12px 22px;
    border-radius: 50px;
    background: rgba(255,255,255,0.18);
    color: #fff;
    text-decoration: none;
    font-size: clamp(0.95rem, 2.5vw, 1.15rem);
    font-weight: bold;
    border: 2px solid rgba(255,255,255,0.5);
    transition: background 0.15s ease;
  }
  .other-game:hover { background: rgba(255,255,255,0.3); }

  .emoji-rain {
    position: fixed;
    top: -50px;
    font-size: 2rem;
    pointer-events: none;
    animation: fall linear forwards;
    z-index: 5;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }
</style>
</head>
<body>
  <h1>🎭 Act It Out! 🎭</h1>
  <div class="subtitle">Do the silly action. Make everyone laugh! 😂</div>

  <div class="card" id="card">
    <div id="action">Press the big button to start! 👇</div>
  </div>

  <div class="controls">
    <button id="newBtn">🎲 New Action!</button>
    <button id="timerBtn">⏱️ Act for 10s</button>
  </div>

  <div id="countdown"></div>
  <div class="counter">Action <span id="num">0</span> &nbsp;•&nbsp; <span id="total">0</span> silly actions inside!</div>
  <a class="other-game" href="https://hmofet.github.io/headbands/">🧠 Try our other game: Headbands →</a>

<script>
/* ---------- Build a list of 1000+ funny actions ---------- */
const actions = new Set();

// Curated hand-written gems
const gems = [
  "Walk like a duck", "Drive an invisible bicycle",
  "Eat a bowl of spaghetti with chopsticks", "Pretend to be a melting ice cream cone",
  "Sneeze like an elephant", "Tiptoe past a sleeping dragon",
  "Brush your teeth with a banana", "Be a robot that ran out of batteries",
  "Hatch out of an invisible egg", "Swim across the floor like a fish",
  "Pretend your shoes are stuck in bubblegum", "Be a balloon slowly losing air",
  "Conduct an orchestra of angry cats", "Tie your shoes while sneezing",
  "Be a noodle in the wind", "Pretend the floor is hot lava",
  "Wash an invisible elephant", "Eat the spiciest taco in the world",
  "Be a kangaroo who lost its bounce", "Sneak a cookie like a ninja",
  "Pretend to be a sprinkler on a hot day", "Open a jar that will NOT open",
  "Be a penguin on roller skates", "Catch a fly with chopsticks",
  "Be a wizard casting a clumsy spell", "Pretend to be stuck in a tiny box",
  "Walk against a super strong wind", "Be a snail in a big hurry",
  "Pretend to juggle invisible jellyfish", "Do a slow-motion victory dance",
  "Be a frog catching bugs with your tongue", "Brush an invisible horse",
  "Pretend your hands are puppets having an argument", "Be a cat knocking things off a table",
  "Inflate yourself like a giant beach ball", "Be a clock with the hiccups",
  "Pretend to walk a very strong dog", "Be a chicken laying a giant egg",
  "Tiptoe across a floor covered in Lego", "Be a superhero whose cape is too long"
];
gems.forEach(g => actions.add(g));

// Word banks for combinations
const animals = ["duck","monkey","penguin","kangaroo","crab","frog","gorilla","flamingo","T-rex","sloth","bunny","chicken","elephant","snake","cat","puppy","horse","bear","octopus","ostrich","seal","squirrel","turtle","worm"];
const animalsSilly = ["duck","monkey","penguin","kangaroo","crab","frog","gorilla","flamingo","sloth","bunny","chicken","octopus","ostrich","seal","squirrel"];
const moves = ["like a","as if you are a"];
const vehicles = ["bicycle","motorcycle","race car","helicopter","rocket ship","skateboard","hot air balloon","tractor","submarine","unicycle","jet ski","spaceship"];
const foods = ["spaghetti","a giant pizza","jelly","a melting popsicle","a watermelon","soup","a hot dog","noodles","a stack of pancakes","sticky honey","a sour lemon","popcorn"];
const utensils = ["chopsticks","a tiny spoon","your elbows","a giant fork","oven mitts on","no hands at all","a shovel","a straw"];
const characters = ["a sleepy robot","a grumpy wizard","a goofy alien","a tiny giant","a fancy king","a sneaky pirate","a clumsy ninja","a superhero","a mad scientist","a circus clown","a cowboy","a knight in heavy armor","a fairy","a vampire afraid of the dark","a ghost who is shy"];
const emotions = ["super excited","really sleepy","very angry","extremely scared","totally confused","over-the-top happy","grumpy","in slow motion","like it's freezing cold","like it's the hottest day ever"];
const chores = ["brush your teeth","wash the dishes","fold laundry","sweep the floor","take out the trash","make your bed","vacuum the carpet","water the plants","mop the kitchen","tie your shoes"];
const verbsLike = ["Walk","Dance","Run","Jump","Sing","Talk","Laugh","Sneak","March","Wiggle","Hop","Crawl","Stomp","Spin","Sneeze","Eat","Sleep","Stretch","Tiptoe","Waddle"];
const inviObjects = ["umbrella","yo-yo","jump rope","hula hoop","trumpet","fishing rod","kite","slingshot","accordion","frisbee","balloon","lasso","shopping cart","wheelbarrow","lawnmower"];
const pretendThings = ["a tree blowing in the wind","an ice cube melting","a popcorn kernel popping","a flower growing from a seed","a rocket about to launch","a statue that suddenly comes alive","a teapot whistling","a washing machine on spin cycle","a leaf falling from a tree","a phone that won't stop ringing","a door that squeaks","a toaster popping toast","a volcano erupting","a snowman in the sun","a piece of bacon sizzling"];
const sportsSilly = ["basketball","tennis","golf","bowling","ping pong","boxing","ice skating","surfing","skiing","archery","weightlifting","fishing"];
const enemies = ["bee","invisible monster","tickle monster","giant marshmallow","angry goose","swarm of butterflies","grumpy robot","mischievous gremlin"];

function add(s){ actions.add(s); }

// Template generators
verbsLike.forEach(v => animals.forEach(a => add(`${v} like a ${a}`)));
foods.forEach(f => utensils.forEach(u => add(`Eat ${f} with ${u}`)));
characters.forEach(c => chores.forEach(ch => add(`${capFirst(ch)} like ${c}`)));
vehicles.forEach(v => add(`Drive an invisible ${v}`));
vehicles.forEach(v => add(`Ride an invisible ${v} down a bumpy hill`));
inviObjects.forEach(o => add(`Play with an invisible ${o}`));
inviObjects.forEach(o => add(`Pretend to use a giant ${o}`));
pretendThings.forEach(p => add(`Be ${p}`));
sportsSilly.forEach(s => add(`Play ${s} in slow motion`));
sportsSilly.forEach(s => add(`Play ${s} like ${randPick(characters)}`));
enemies.forEach(e => add(`Run away from a ${e}`));
enemies.forEach(e => add(`Tiptoe past a sleeping ${e}`));
emotions.forEach(em => animalsSilly.forEach(a => add(`Be a ${a} that is ${em}`)));
emotions.forEach(em => chores.forEach(ch => add(`${capFirst(ch)} while feeling ${em}`)));
characters.forEach(c => emotions.forEach(em => add(`Be ${c} who is ${em}`)));
animals.forEach(a => vehicles.forEach(v => add(`Be a ${a} riding a ${v}`)));
animalsSilly.forEach(a => inviObjects.forEach(o => add(`Be a ${a} playing an invisible ${o}`)));

function capFirst(s){ return s.charAt(0).toUpperCase() + s.slice(1); }
function randPick(arr){ return arr[Math.floor(Math.random() * arr.length)]; }

const ACTIONS = Array.from(actions);

/* ---------- Game logic ---------- */
const actionEl = document.getElementById('action');
const card = document.getElementById('card');
const numEl = document.getElementById('num');
const countdownEl = document.getElementById('countdown');
document.getElementById('total').textContent = ACTIONS.length;

let count = 0;
let timerId = null;

function newAction(){
  if (timerId) { clearInterval(timerId); timerId = null; countdownEl.textContent = ""; }
  const pick = ACTIONS[Math.floor(Math.random() * ACTIONS.length)];
  actionEl.textContent = pick + "!";
  count++;
  numEl.textContent = count;
  card.classList.remove('pop');
  void card.offsetWidth; // restart animation
  card.classList.add('pop');
  emojiRain();
}

const partyEmojis = ["🎉","😂","🤪","🎈","⭐","🌈","🦄","🐸","🎭","🍕","🤸","🐧","🎪","💥","🌟"];
function emojiRain(){
  for (let i = 0; i < 12; i++){
    const e = document.createElement('div');
    e.className = 'emoji-rain';
    e.textContent = partyEmojis[Math.floor(Math.random()*partyEmojis.length)];
    e.style.left = Math.random()*100 + 'vw';
    e.style.animationDuration = (1.5 + Math.random()*1.5) + 's';
    document.body.appendChild(e);
    setTimeout(() => e.remove(), 3200);
  }
}

function startTimer(){
  newAction();
  let t = 10;
  countdownEl.textContent = "⏱️ " + t;
  if (timerId) clearInterval(timerId);
  timerId = setInterval(() => {
    t--;
    if (t > 0){
      countdownEl.textContent = "⏱️ " + t;
    } else {
      clearInterval(timerId); timerId = null;
      countdownEl.textContent = "🎉 TIME'S UP! 🎉";
      emojiRain();
    }
  }, 1000);
}

document.getElementById('newBtn').addEventListener('click', newAction);
document.getElementById('timerBtn').addEventListener('click', startTimer);
document.addEventListener('keydown', e => { if (e.code === 'Space'){ e.preventDefault(); newAction(); } });
</script>
</body>
</html>
